<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="./styles.css" />
		<script src="./app.js" defer></script>
	</head>
	<body>
		<div class="container">
			<div class="results-container">
				<h1>Hi there stranger!</h1>
				<h2>Your results will appear when quiz is completed:</h2>
				<div id="results-invisible" class="score-time invisible">
					<p id="percentage" class="score-text">0.00%</p>
					<p>
						<span id="questions-correct" class="score-text">0</span><br />
						Out of <span id="questions-length"></span> questions correct
					</p>
					<p>
						<span id="timer" class="score-text">00:00</span><br />
						Time for this attempt
					</p>
				</div>
				<h2>Your Answers:</h2>
			</div>
			<form id="form" class="form-container"></form>

			<template id="question-template">
				<div class="question-container">
					<h3 id="question-title"></h3>
					<div id="option" class="radios-container"></div>
				</div>
			</template>
		</div>
	</body>
</html>
